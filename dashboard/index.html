<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment runs · AutoNeuro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #f4f4f4;
            --bg-surface: #ffffff;
            --border-subtle: #e0e0e0;
            --text-primary: #161616;
            --text-secondary: #525252;
            --text-helper: #6f6f6f;
            --interactive: #0f62fe;
            --keep: #27ae60;
            --discard: #f39c12;
            --crash: #e74c3c;
            --code-bg: #f4f4f4;
            --header-height: 3rem;
            --max-content: 99rem;
            --spacing-md: 1rem;
            --spacing-lg: 1.5rem;
            --spacing-xl: 2rem;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "IBM Plex Sans", system-ui, sans-serif;
            font-size: 0.875rem;
            line-height: 1.4;
            color: var(--text-primary);
            background: var(--bg-page);
            min-height: 100vh;
        }
        .shell-header {
            height: var(--header-height);
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: stretch;
        }
        .shell-header__exit {
            border: 0;
            border-right: 1px solid var(--border-subtle);
            background: #e74c3c;
            color: #fff;
            font-weight: 600;
            padding: 0 1rem;
            cursor: pointer;
        }
        .shell-header__exit:hover { background: #c0392b; }
        .shell-header__exit:disabled { opacity: 0.65; cursor: not-allowed; }
        .shell-header__brand {
            display: flex;
            align-items: center;
            padding: 0 var(--spacing-md);
            border-right: 1px solid var(--border-subtle);
            font-weight: 600;
        }
        .shell-header__brand span { font-weight: 400; color: var(--text-secondary); margin-left: 0.5rem; }
        .shell-nav { display: flex; align-items: stretch; }
        .shell-nav a {
            display: flex;
            align-items: center;
            padding: 0 var(--spacing-lg);
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
        }
        .shell-nav a:hover { background: var(--bg-page); color: var(--text-primary); }
        .shell-nav a.is-active { color: var(--text-primary); border-bottom-color: var(--interactive); }
        .layout {
            max-width: var(--max-content);
            margin: 0 auto;
            padding: var(--spacing-lg) var(--spacing-xl);
        }
        .page-header {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            justify-content: space-between;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
            padding-bottom: var(--spacing-md);
            border-bottom: 1px solid var(--border-subtle);
        }
        .page-header h1 { font-size: 1.25rem; font-weight: 600; }
        .page-header p { font-size: 0.8125rem; color: var(--text-secondary); margin-top: 0.25rem; max-width: 42rem; }
        .meta-bar { font-size: 0.75rem; color: var(--text-helper); }
        .run-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(18rem, 1fr));
            gap: var(--spacing-lg);
        }
        .run-card {
            background: var(--bg-surface);
            border-radius: 4px;
            border: 3px solid var(--border-subtle);
            padding: var(--spacing-md);
            box-shadow: 0 1px 2px rgba(0,0,0,0.06);
        }
        .run-card--keep { border-color: var(--keep); }
        .run-card--discard { border-color: var(--discard); }
        .run-card--crash { border-color: var(--crash); }
        .run-card__status {
            font-size: 0.6875rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.5rem;
        }
        .run-card__status--keep { color: var(--keep); }
        .run-card__status--discard { color: var(--discard); }
        .run-card__status--crash { color: var(--crash); }
        .run-card__row {
            display: flex;
            justify-content: space-between;
            gap: 0.5rem;
            margin-top: 0.35rem;
            font-size: 0.8125rem;
        }
        .run-card__label { color: var(--text-secondary); flex-shrink: 0; }
        .run-card__value { text-align: right; word-break: break-word; }
        .mono { font-family: "IBM Plex Mono", ui-monospace, monospace; font-size: 0.75rem; }
        .metric { font-weight: 600; font-variant-numeric: tabular-nums; }
        .diff-preview {
            margin-top: var(--spacing-md);
            padding: var(--spacing-md);
            background: var(--code-bg);
            border: 1px solid var(--border-subtle);
            border-radius: 2px;
            font-family: "IBM Plex Mono", ui-monospace, monospace;
            font-size: 0.72rem;
            line-height: 1.45;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 10rem;
            overflow-y: auto;
        }
        .empty-state, .inline-error {
            text-align: center;
            padding: var(--spacing-xl);
            background: var(--bg-surface);
            border: 1px dashed var(--border-subtle);
        }
        .inline-error { border-color: var(--crash); text-align: left; }
    </style>
</head>
<body>
    <header class="shell-header">
        <button class="shell-header__exit" id="exitBtn" type="button">Exit</button>
        <div class="shell-header__brand">AutoNeuro <span>Operations</span></div>
        <nav class="shell-nav" aria-label="Primary">
            <a href="/" class="is-active">Runs</a>
            <a href="/flags">Flags</a>
        </nav>
    </header>
    <main class="layout">
        <div class="page-header">
            <div>
                <h1>Experiment runs</h1>
                <p>Synced from the orchestrator after each training run. Cards refresh from the database every 10 seconds.</p>
            </div>
            <div class="meta-bar" id="refreshStatus" aria-live="polite">Loading…</div>
        </div>
        <div id="content"></div>
    </main>
    <script>
        const REFRESH_INTERVAL_MS = 10000;

        function escHtml(s) {
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function truncate(s, n) {
            if (!s) return '';
            return s.length > n ? s.slice(0, n) + '…' : s;
        }

        function formatMetric(v) {
            if (v === null || v === undefined) return '—';
            const x = Number(v);
            return Number.isFinite(x) ? x.toFixed(4) : String(v);
        }

        function formatTs(ts) {
            if (!ts) return '—';
            return new Date(ts).toLocaleString(undefined, {
                year: 'numeric', month: 'short', day: '2-digit',
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
        }

        function statusClass(status) {
            const u = (status || '').toUpperCase();
            if (u === 'KEEP') return 'keep';
            if (u === 'DISCARD') return 'discard';
            if (u === 'CRASH') return 'crash';
            return 'unknown';
        }

        function downloadJson(filename, data) {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
        }

        async function handleExitDashboard() {
            const ok = window.confirm(
                'Exit dashboard and refresh database?\n\nThis will export all runs/flags to a JSON file and then clear the database tables.'
            );
            if (!ok) return;

            const btn = document.getElementById('exitBtn');
            const oldLabel = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Exiting...';
            try {
                const res = await fetch('/api/dashboard/exit', { method: 'POST' });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
                downloadJson(data.filename || 'autoneuro-db-export.json', data.export || {});
                await fetchRuns();
                window.alert('Database exported and refreshed.');
            } catch (e) {
                window.alert('Exit failed: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = oldLabel;
            }
        }

        function renderCard(run) {
            const sc = statusClass(run.status);
            const borderMod = sc === 'unknown' ? '' : ' run-card--' + sc;
            const statusLabelMod = sc === 'unknown' ? '' : ' run-card__status--' + sc;
            const diffText = truncate(run.diff || '', 600);
            return (
                '<article class="run-card' + borderMod + '">' +
                    '<div class="run-card__status' + statusLabelMod + '">' + escHtml(run.status || '—') + '</div>' +
                    '<div class="run-card__row"><span class="run-card__label">Iteration</span><span class="run-card__value mono">' + escHtml(String(run.iteration ?? '—')) + '</span></div>' +
                    '<div class="run-card__row"><span class="run-card__label">Metric</span><span class="run-card__value metric">' + escHtml(formatMetric(run.metric_value)) + '</span></div>' +
                    '<div class="run-card__row"><span class="run-card__label">Commit</span><span class="run-card__value mono">' + escHtml(truncate(run.commit_hash || '', 14)) + '</span></div>' +
                    '<div class="run-card__row"><span class="run-card__label">Time</span><span class="run-card__value ts">' + escHtml(formatTs(run.timestamp)) + '</span></div>' +
                    (diffText
                        ? '<div class="diff-preview">' + escHtml(diffText) + '</div>'
                        : '') +
                '</article>'
            );
        }

        async function fetchRuns() {
            const el = document.getElementById('content');
            const statusEl = document.getElementById('refreshStatus');
            try {
                const res = await fetch('/api/runs');
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const runs = await res.json();
                if (!Array.isArray(runs) || runs.length === 0) {
                    el.innerHTML = '<div class="empty-state"><p>No runs in the database yet. Start <code class="mono">python orchestrator.py</code>.</p></div>';
                } else {
                    el.innerHTML = '<div class="run-grid">' + runs.map(renderCard).join('') + '</div>';
                }
                statusEl.textContent = 'Updated ' + new Date().toLocaleTimeString() + ' · every ' + (REFRESH_INTERVAL_MS / 1000) + 's';
            } catch (e) {
                el.innerHTML = '<div class="inline-error"><strong>Unable to load runs.</strong> ' + escHtml(e.message) + '</div>';
            }
        }

        let timer;
        function startRefresh() {
            if (timer) clearInterval(timer);
            fetchRuns();
            timer = setInterval(fetchRuns, REFRESH_INTERVAL_MS);
        }

        document.addEventListener('DOMContentLoaded', startRefresh);
        document.addEventListener('DOMContentLoaded', function () {
            const btn = document.getElementById('exitBtn');
            if (btn) btn.addEventListener('click', handleExitDashboard);
        });
        document.addEventListener('visibilitychange', function () {
            if (document.hidden) {
                clearInterval(timer);
                timer = null;
            } else startRefresh();
        });
    </script>
</body>
</html>
