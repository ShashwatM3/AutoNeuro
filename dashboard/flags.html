<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flags · AutoNeuro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #f4f4f4;
            --bg-surface: #ffffff;
            --border-subtle: #e0e0e0;
            --border-strong: #c6c6c6;
            --text-primary: #161616;
            --text-secondary: #525252;
            --text-helper: #6f6f6f;
            --interactive: #0f62fe;
            --interactive-hover: #0043ce;
            --flag-pending-accent: #fa4d56;
            --flag-resolved-accent: #6fdc8c;
            --tag-pending-bg: #fff1f1;
            --tag-pending-text: #750e13;
            --tag-pending-border: #fa4d56;
            --tag-resolved-bg: #defbe6;
            --tag-resolved-text: #0e6027;
            --tag-resolved-border: #6fdc8c;
            --header-height: 3rem;
            --max-content: 99rem;
            --spacing-xs: 0.25rem;
            --spacing-sm: 0.5rem;
            --spacing-md: 1rem;
            --spacing-lg: 1.5rem;
            --spacing-xl: 2rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "IBM Plex Sans", system-ui, -apple-system, sans-serif;
            font-size: 0.875rem;
            line-height: 1.375;
            color: var(--text-primary);
            background: var(--bg-page);
            min-height: 100vh;
        }

        .shell-header {
            height: var(--header-height);
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: stretch;
        }

        .shell-header__exit {
            border: 0;
            border-right: 1px solid var(--border-subtle);
            background: #e74c3c;
            color: #fff;
            font-weight: 600;
            padding: 0 1rem;
            cursor: pointer;
        }

        .shell-header__exit:hover {
            background: #c0392b;
        }

        .shell-header__exit:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        .shell-header__brand {
            display: flex;
            align-items: center;
            padding: 0 var(--spacing-md);
            border-right: 1px solid var(--border-subtle);
            font-weight: 600;
            font-size: 0.875rem;
            letter-spacing: 0.01em;
            color: var(--text-primary);
            white-space: nowrap;
        }

        .shell-header__brand span {
            font-weight: 400;
            color: var(--text-secondary);
            margin-left: var(--spacing-sm);
        }

        .shell-nav {
            display: flex;
            align-items: stretch;
        }

        .shell-nav a {
            display: flex;
            align-items: center;
            padding: 0 var(--spacing-lg);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.8125rem;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
        }

        .shell-nav a:hover {
            background: var(--bg-page);
            color: var(--text-primary);
        }

        .shell-nav a.is-active {
            color: var(--text-primary);
            border-bottom-color: var(--interactive);
        }

        .layout {
            max-width: var(--max-content);
            margin: 0 auto;
            padding: var(--spacing-lg) var(--spacing-xl);
        }

        .page-header {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            justify-content: space-between;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
            padding-bottom: var(--spacing-md);
            border-bottom: 1px solid var(--border-subtle);
        }

        .page-header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .page-header p {
            font-size: 0.8125rem;
            color: var(--text-secondary);
            margin-top: var(--spacing-xs);
            max-width: 40rem;
        }

        .meta-bar {
            font-size: 0.75rem;
            color: var(--text-helper);
            font-variant-numeric: tabular-nums;
        }

        .toast-stack {
            margin-bottom: var(--spacing-md);
        }

        .toast {
            padding: var(--spacing-sm) var(--spacing-md);
            font-size: 0.8125rem;
            border: 1px solid var(--border-strong);
            margin-bottom: var(--spacing-sm);
            background: var(--bg-surface);
        }

        .toast--success {
            border-color: #6fdc8c;
            background: #defbe6;
        }

        .toast--error {
            border-color: #fa4d56;
            background: #fff1f1;
        }

        .flag-list {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }

        .flag-panel {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-top: 3px solid var(--border-strong);
        }

        .flag-panel--pending {
            border-top-color: var(--flag-pending-accent);
        }

        .flag-panel--resolved {
            border-top-color: var(--flag-resolved-accent);
        }

        .flag-panel__head {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: var(--spacing-md);
            padding: var(--spacing-md) var(--spacing-lg);
            border-bottom: 1px solid var(--border-subtle);
            background: var(--bg-page);
            cursor: pointer;
            user-select: none;
            text-align: left;
            width: 100%;
            font: inherit;
            color: inherit;
        }

        .flag-panel__head:focus {
            outline: 2px solid var(--interactive);
            outline-offset: -2px;
        }

        .flag-panel__head-inner {
            display: flex;
            align-items: flex-start;
            gap: var(--spacing-sm);
            flex: 1;
            min-width: 0;
        }

        .flag-chev {
            display: inline-block;
            width: 1rem;
            flex-shrink: 0;
            color: var(--text-helper);
            transition: transform 0.15s ease;
            margin-top: 0.125rem;
        }

        .flag-panel.is-expanded .flag-chev {
            transform: rotate(90deg);
            color: var(--interactive);
        }

        .flag-panel__title {
            font-size: 0.9375rem;
            font-weight: 600;
        }

        .flag-panel__subtitle {
            font-size: 0.75rem;
            color: var(--text-helper);
            margin-top: var(--spacing-xs);
            font-variant-numeric: tabular-nums;
        }

        .state-pill {
            font-size: 0.6875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 0.25rem 0.625rem;
            border: 1px solid transparent;
            flex-shrink: 0;
        }

        .state-pill--pending {
            background: var(--tag-pending-bg);
            color: var(--tag-pending-text);
            border-color: var(--tag-pending-border);
        }

        .state-pill--resolved {
            background: var(--tag-resolved-bg);
            color: var(--tag-resolved-text);
            border-color: var(--tag-resolved-border);
        }

        .flag-panel__collapse {
            border-bottom: 1px solid var(--border-subtle);
        }

        .flag-panel__body {
            padding: var(--spacing-lg);
        }

        .dl-grid {
            display: grid;
            grid-template-columns: 8rem 1fr;
            gap: var(--spacing-sm) var(--spacing-lg);
            font-size: 0.8125rem;
        }

        @media (max-width: 40rem) {
            .dl-grid {
                grid-template-columns: 1fr;
            }
        }

        .dl-grid dt {
            font-size: 0.6875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            padding-top: 0.125rem;
        }

        .dl-grid dd {
            margin: 0;
            word-break: break-word;
        }

        .reason-chip {
            display: inline-block;
            font-family: "IBM Plex Mono", ui-monospace, monospace;
            font-size: 0.6875rem;
            padding: 0.125rem 0.5rem;
            border: 1px solid var(--border-strong);
            background: var(--bg-page);
            text-transform: lowercase;
        }

        .prose-block {
            margin-top: var(--spacing-md);
            padding: var(--spacing-md);
            border: 1px solid var(--border-subtle);
            background: var(--bg-page);
            font-size: 0.8125rem;
            line-height: 1.5;
        }

        .instruction-block {
            margin-top: var(--spacing-md);
            padding: var(--spacing-md);
            border: 1px solid #6fdc8c;
            background: #defbe6;
            font-size: 0.8125rem;
        }

        .instruction-block .label {
            font-size: 0.6875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--tag-resolved-text);
            margin-bottom: var(--spacing-sm);
        }

        .flag-panel__actions {
            margin-top: var(--spacing-lg);
            padding-top: var(--spacing-lg);
            border-top: 1px solid var(--border-subtle);
        }

        .field-label {
            font-size: 0.6875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: var(--spacing-sm);
        }

        .textarea {
            width: 100%;
            min-height: 6.5rem;
            padding: var(--spacing-sm) var(--spacing-md);
            font-family: "IBM Plex Sans", system-ui, sans-serif;
            font-size: 0.8125rem;
            line-height: 1.5;
            border: 1px solid var(--border-strong);
            background: var(--bg-surface);
            resize: vertical;
        }

        .textarea:focus {
            outline: 2px solid var(--interactive);
            outline-offset: 1px;
        }

        .btn-row {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-sm);
            margin-top: var(--spacing-md);
        }

        .btn {
            font-family: inherit;
            font-size: 0.8125rem;
            font-weight: 500;
            padding: 0.5625rem 1rem;
            border: 1px solid transparent;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 2.5rem;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn--primary {
            background: var(--interactive);
            color: #fff;
        }

        .btn--primary:hover:not(:disabled) {
            background: var(--interactive-hover);
        }

        .btn--secondary {
            background: var(--bg-surface);
            color: var(--text-primary);
            border-color: var(--interactive);
        }

        .btn--secondary:hover:not(:disabled) {
            background: #e5f6ff;
        }

        .btn--tertiary {
            background: transparent;
            color: var(--text-primary);
            border-color: var(--border-strong);
        }

        .btn--tertiary:hover:not(:disabled) {
            background: var(--bg-page);
        }

        .empty-state {
            text-align: center;
            padding: var(--spacing-xl) var(--spacing-lg);
            border: 1px dashed var(--border-strong);
            background: var(--bg-surface);
        }

        .empty-state h2 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: var(--spacing-sm);
        }

        .empty-state p {
            font-size: 0.8125rem;
            color: var(--text-secondary);
            max-width: 28rem;
            margin: 0 auto;
        }

        .inline-error {
            padding: var(--spacing-md);
            border: 1px solid #fa4d56;
            background: #fff1f1;
            font-size: 0.8125rem;
        }

        @media (max-width: 48rem) {
            .layout {
                padding: var(--spacing-md);
            }

            .shell-header {
                flex-wrap: wrap;
                height: auto;
            }

            .shell-header__brand {
                border-right: none;
                flex: 1 1 100%;
                border-bottom: 1px solid var(--border-subtle);
            }

            .shell-nav {
                width: 100%;
            }

            .shell-nav a {
                flex: 1;
                justify-content: center;
            }

            .btn-row .btn {
                flex: 1 1 auto;
                min-width: calc(50% - var(--spacing-sm));
            }
        }
    </style>
</head>
<body>
    <header class="shell-header">
        <button class="shell-header__exit" id="exitBtn" type="button">Exit</button>
        <div class="shell-header__brand">AutoNeuro <span>Operations</span></div>
        <nav class="shell-nav" aria-label="Primary">
            <a href="/">Runs</a>
            <a href="/flags" class="is-active">Flags</a>
        </nav>
    </header>

    <main class="layout">
        <div class="page-header">
            <div>
                <h1>Flags</h1>
                <p>Contact-agent flags from the database. Click a flag header to show context and actions. Submitting a response writes the instruction file for the orchestrator.</p>
            </div>
            <div class="meta-bar" id="refreshStatus" aria-live="polite">Loading…</div>
        </div>

        <div class="toast-stack" id="toastRoot" aria-live="polite"></div>

        <div id="content">
            <div class="empty-state" style="border-style: solid;">
                <p>Loading flags…</p>
            </div>
        </div>
    </main>

    <script>
        let refreshInterval;
        const REFRESH_INTERVAL = 30000;

        function formatTimestamp(timestamp) {
            if (!timestamp) return '—';
            return new Date(timestamp).toLocaleString(undefined, {
                year: 'numeric', month: 'short', day: '2-digit',
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
        }

        function formatTriggerReason(reason) {
            if (!reason) return 'unknown';
            return String(reason).replace(/_/g, ' ');
        }

        function escHtml(s) {
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function downloadJson(filename, data) {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
        }

        async function handleExitDashboard() {
            const ok = window.confirm(
                'Exit dashboard and refresh database?\n\nThis will export all runs/flags to a JSON file and then clear the database tables.'
            );
            if (!ok) return;
            const btn = document.getElementById('exitBtn');
            const oldLabel = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Exiting...';
            try {
                const res = await fetch('/api/dashboard/exit', { method: 'POST' });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
                downloadJson(data.filename || 'autoneuro-db-export.json', data.export || {});
                await fetchFlags();
                showMessage('Database exported and refreshed.', 'success');
            } catch (e) {
                showMessage('Exit failed: ' + e.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = oldLabel;
            }
        }

        async function makeRequest(url, options) {
            options = options || {};
            const response = await fetch(url, {
                headers: {
                    'Content-Type': 'application/json',
                    ...(options.headers || {})
                },
                ...options
            });

            if (!response.ok) {
                const error = await response.json().catch(function () { return { error: 'HTTP ' + response.status }; });
                throw new Error(error.error || ('HTTP ' + response.status + ': ' + response.statusText));
            }

            return await response.json();
        }

        function showMessage(message, type) {
            const root = document.getElementById('toastRoot');
            const el = document.createElement('div');
            el.className = 'toast ' + (type === 'success' ? 'toast--success' : 'toast--error');
            el.textContent = message;
            root.appendChild(el);
            setTimeout(function () { el.remove(); }, 5000);
        }

        function toggleFlagCollapse(header) {
            const panel = header.closest('.flag-panel');
            const id = header.getAttribute('aria-controls');
            if (!panel || !id) return;
            const body = document.getElementById(id);
            if (!body) return;
            body.hidden = !body.hidden;
            const open = !body.hidden;
            panel.classList.toggle('is-expanded', open);
            header.setAttribute('aria-expanded', String(open));
        }

        function bindFlagPanels(root) {
            root.addEventListener('click', function (e) {
                const header = e.target.closest('.flag-panel__head');
                if (!header || !root.contains(header)) return;
                toggleFlagCollapse(header);
            });
            root.addEventListener('keydown', function (e) {
                if (e.key !== 'Enter' && e.key !== ' ') return;
                const header = e.target.closest('.flag-panel__head');
                if (!header || !root.contains(header)) return;
                e.preventDefault();
                toggleFlagCollapse(header);
            });
        }

        async function respondToFlag(flagId, instruction) {
            const data = await makeRequest('/api/flags/' + flagId + '/respond', {
                method: 'POST',
                body: JSON.stringify({ human_instruction: instruction })
            });
            showMessage(data.message, 'success');
            setTimeout(fetchFlags, 800);
        }

        async function resolveFlag(flagId) {
            const data = await makeRequest('/api/flags/' + flagId + '/resolve', {
                method: 'POST'
            });
            showMessage(data.message, 'success');
            setTimeout(fetchFlags, 800);
        }

        async function summarizeFlag(flagId) {
            const button = document.querySelector('#summarize-' + flagId);
            const panel = document.querySelector('article[data-flag-id="' + flagId + '"]');
            const isResolved = panel && panel.classList.contains('flag-panel--resolved');
            const labelIdle = isResolved ? 'Regenerate summary' : 'Generate summary';
            if (button) {
                button.disabled = true;
                button.textContent = 'Working…';
            }
            try {
                const data = await makeRequest('/api/flags/' + flagId + '/summarize', {
                    method: 'POST'
                });
                showMessage(data.message, 'success');
                setTimeout(fetchFlags, 800);
            } finally {
                if (button) {
                    button.disabled = false;
                    button.textContent = labelIdle;
                }
            }
        }

        function createFlagPanel(flag) {
            const isResolved = flag.resolved;
            const panelMod = isResolved ? 'flag-panel--resolved' : 'flag-panel--pending';
            const pillMod = isResolved ? 'state-pill--resolved' : 'state-pill--pending';
            const pillText = isResolved ? 'Resolved' : 'Pending';
            const triggerDisplay = formatTriggerReason(flag.trigger_reason);
            const triggerSlug = triggerDisplay.replace(/[^a-z0-9]+/gi, '-').toLowerCase();
            const collapseId = 'flag-collapse-' + flag.id;

            const actionsOpen = !isResolved
                ? '<div class="flag-panel__actions">' +
                    '<div class="field-label">Instruction to orchestrator</div>' +
                    '<textarea class="textarea" id="response-' + flag.id + '" placeholder="Required for submit. Be explicit about constraints or next steps."></textarea>' +
                    '<div class="btn-row">' +
                        '<button type="button" class="btn btn--primary" onclick="handleResponse(' + flag.id + ')">Submit and resolve</button>' +
                        '<button type="button" class="btn btn--secondary" onclick="handleResolve(' + flag.id + ')">Resolve without instruction</button>' +
                        '<button type="button" class="btn btn--tertiary" id="summarize-' + flag.id + '" onclick="handleSummarize(' + flag.id + '); event.stopPropagation();">Generate summary</button>' +
                    '</div>' +
                  '</div>'
                : '<div class="flag-panel__actions">' +
                    '<div class="btn-row">' +
                        '<button type="button" class="btn btn--tertiary" id="summarize-' + flag.id + '" onclick="handleSummarize(' + flag.id + '); event.stopPropagation();">Regenerate summary</button>' +
                    '</div>' +
                  '</div>';

            const humanBlock = flag.human_instruction
                ? '<div class="instruction-block">' +
                    '<div class="label">Recorded instruction</div>' +
                    '<div>' + escHtml(flag.human_instruction) + '</div>' +
                  '</div>'
                : '';

            return (
                '<article class="flag-panel ' + panelMod + '" data-flag-id="' + flag.id + '">' +
                    '<button type="button" class="flag-panel__head" aria-expanded="false" aria-controls="' + collapseId + '">' +
                        '<div class="flag-panel__head-inner">' +
                            '<span class="flag-chev" aria-hidden="true">▸</span>' +
                            '<div>' +
                                '<div class="flag-panel__title">Flag #' + flag.id + '</div>' +
                                '<div class="flag-panel__subtitle">Iteration ' + flag.iteration + ' · ' + formatTimestamp(flag.timestamp) + '</div>' +
                            '</div>' +
                        '</div>' +
                        '<span class="state-pill ' + pillMod + '">' + pillText + '</span>' +
                    '</button>' +
                    '<div id="' + collapseId + '" class="flag-panel__collapse" hidden>' +
                        '<div class="flag-panel__body">' +
                            '<dl class="dl-grid">' +
                                '<dt>Trigger</dt>' +
                                '<dd><span class="reason-chip reason-' + escHtml(triggerSlug) + '">' + escHtml(triggerDisplay) + '</span></dd>' +
                                '<dt>Context</dt>' +
                                '<dd><div class="prose-block">' + escHtml(flag.context_summary || 'No summary.') + '</div></dd>' +
                            '</dl>' +
                            humanBlock +
                            actionsOpen +
                        '</div>' +
                    '</div>' +
                '</article>'
            );
        }

        async function handleResponse(flagId) {
            const textarea = document.getElementById('response-' + flagId);
            const instruction = textarea.value.trim();
            if (!instruction) {
                showMessage('Enter an instruction before submit.', 'error');
                return;
            }
            try {
                await respondToFlag(flagId, instruction);
            } catch (error) {
                showMessage(error.message, 'error');
            }
        }

        async function handleResolve(flagId) {
            if (!confirm('Resolve this flag without writing an instruction file?')) return;
            try {
                await resolveFlag(flagId);
            } catch (error) {
                showMessage(error.message, 'error');
            }
        }

        async function handleSummarize(flagId) {
            try {
                await summarizeFlag(flagId);
            } catch (error) {
                showMessage(error.message, 'error');
            }
        }

        async function fetchFlags() {
            try {
                const flags = await makeRequest('/api/flags');
                const contentDiv = document.getElementById('content');

                if (!Array.isArray(flags) || flags.length === 0) {
                    contentDiv.innerHTML =
                        '<div class="empty-state">' +
                            '<h2>No flags</h2>' +
                            '<p>The flags table is empty. Rows appear when the orchestrator records contact flags in the database.</p>' +
                        '</div>';
                } else {
                    contentDiv.innerHTML = '<div class="flag-list" id="flagList">' + flags.map(createFlagPanel).join('') + '</div>';
                    bindFlagPanels(document.getElementById('flagList'));
                }

                document.getElementById('refreshStatus').textContent =
                    'Updated ' + new Date().toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', second: '2-digit' }) +
                    ' · interval ' + (REFRESH_INTERVAL / 1000) + 's';
            } catch (error) {
                console.error('Error fetching flags:', error);
                document.getElementById('content').innerHTML =
                    '<div class="inline-error"><strong>Unable to load flags.</strong> ' + escHtml(error.message) + '</div>';
            }
        }

        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            fetchFlags();
            refreshInterval = setInterval(fetchFlags, REFRESH_INTERVAL);
        }

        document.addEventListener('DOMContentLoaded', startAutoRefresh);
        document.addEventListener('DOMContentLoaded', function () {
            const btn = document.getElementById('exitBtn');
            if (btn) btn.addEventListener('click', handleExitDashboard);
        });

        document.addEventListener('visibilitychange', function () {
            if (document.hidden) {
                clearInterval(refreshInterval);
                refreshInterval = null;
            } else {
                startAutoRefresh();
            }
        });
    </script>
</body>
</html>
